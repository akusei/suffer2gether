---
name: Build Linux
run-name: ${{ github.actor }} test
on:
  - pull_request
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Set PATH
        run: echo "export PATH=\$PATH:/usr/local/cmake/bin:/usr/local/musl-cross" >> $GITHUB_ENV
      
      - name: Install CMake
        run: |
          cd /tmp
          curl -sS -L -O https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-linux-x86_64.tar.gz
          tar -zxvf ./cmake-4.3.3-linux-x86_64.tar.gz
          sudo mkdir -p /usr/local/cmake
          sudo mv ./cmake-4.3.3-linux-x86_64/* /usr/local/cmake/
          rm -rf ./cmake*

      - name: Install Ninja
        run: |
          cd /tmp
          curl -sS -L -O https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux.zip
          unzip ./ninja-linux.zip
          sudo mv ./ninja /usr/bin/
          rm -rf ./ninja*

      - name: Install Musl Toolchain
        run: |
          cd /tmp
          curl -sS -L -O https://musl.cc/x86_64-linux-musl-cross.tgz
          tar -zxvf ./x86_64-linux-musl-cross.tgz
          sudo mkdir -p /usr/local/musl-cross
          sudo mv ./x86_64-linux-musl-cross/* /usr/local/musl-cross/
          rm -rf ./x86_64-linux-musl-cross*

      - name: Check out repository code
        uses: actions/checkout@v6
      
      - name: Debug Environment
        run: |
          echo "PATH: $PATH"
          echo "SHELL: $SHELL"
        shell: bash