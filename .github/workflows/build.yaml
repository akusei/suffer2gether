---
name: Build Linux
run-name: ${{ github.actor }} test
on:
  - pull_request
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set PATH
        run: echo "export PATH=\$PATH:/usr/local/cmake/bin" >> $GITHUB_ENV
      
      - name: Install CMake
        run: |
          cd /tmp
          curl -sS -L -O https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-linux-x86_64.tar.gz
          tar -zxvf ./cmake-4.3.3-linux-x86_64.tar.gz
          sudo mkdir -p /usr/local/cmake
          sudo mv ./cmake-4.3.3-linux-x86_64/* /usr/local/cmake/
          rm -rf ./cmake*

      - name: Install Ninja
        run: |
          cd /tmp
          curl -sS -L -O https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-linux.zip
          unzip ./ninja-linux.zip
          sudo mv ./ninja /usr/bin/
          rm -rf ./ninja*

      - name: Install Zig
        run: |
          sudo apt-get update
          sudo apt-get install -qy zig
      
      - name: Debug Environment
        run: |
          cmake --version
          ninja --version
          zig --version
          echo "PATH: $PATH"
          echo "SHELL: $SHELL"
        shell: bash